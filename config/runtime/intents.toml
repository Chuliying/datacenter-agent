# Membership base вҖ” identified by membership-specific vocabulary. Generic
# growth words (e.g. жҲҗй•·) are deliberately excluded so revenue-growth phrasing
# like `зҮҹж”¶жҲҗй•·` stays on `revenue` instead of colliding here.
[[intents]]
id = "member"
keywords = ["жңғе“Ў", "жңғе“Ўж•ё", "жңғе“ЎжҲҗй•·", "иЁ»еҶҠ", "з•ҷеӯҳ", "жҙ»иәҚжңғе“Ў", "membership", "member"]

# Full HTML report вҖ” a routing intent, orthogonal to the topic above. When the
# user asks for a "е ұе‘Ҡ" the `/agent/stream` front door runs the `/report`
# pipeline (fetcher вҶ’ analyst вҶ’ composer вҶ’ renderer) instead of `/insight`; the
# topic (зҮҹж”¶ / е……йӣ» / вҖҰ) still rides along in the prompt. Routing keys off this
# intent being *mentioned* (top or candidate), so `зҮҹж”¶е ұе‘Ҡ` reports on revenue.
[[intents]]
id = "report"
keywords = ["е ұе‘Ҡ", "е®Ңж•ҙзҡ„е ұе‘Ҡ", "е®Ңж•ҙе ұе‘Ҡ", "report"]
