name: Runtime

on:
  pull_request:
  push:
    branches:
      - main
      - runtime-test

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

      - name: Pipeline eval
        run: cargo run --bin eval -- --pipeline-only

      - name: Response replay smoke
        run: cargo run --bin eval -- --response --replay config/runtime/evals/replay-smoke.json
